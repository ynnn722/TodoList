<div class="flex items-center justify-between rounded-xl border border-slate-200 bg-white px-3 py-2">
  <div class="flex min-w-0 items-center gap-3">
    <mat-checkbox [checked]="todo.isCompleted" (change)="onToggle()" />
    <div class="min-w-0">
      <p class="truncate text-sm" [class.line-through]="todo.isCompleted" [class.text-slate-400]="todo.isCompleted">
        {{ todo.title }}
      </p>
      <p class="text-xs text-slate-500">{{ todo.createdAt | date: 'yyyy-MM-dd HH:mm' }}</p>
    </div>
  </div>
  <button mat-icon-button aria-label="delete todo" (click)="onRemove()">
    <mat-icon>delete</mat-icon>
  </button>
</div>
