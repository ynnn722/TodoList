<section class="flex min-h-[100dvh] items-center justify-center bg-slate-50 p-4">
  <mat-card class="relative w-full max-w-sm overflow-hidden rounded-2xl shadow-lg">
    @if (loading()) {
      <mat-progress-bar class="absolute left-0 right-0 top-0" mode="indeterminate"></mat-progress-bar>
    }

    <div class="px-6 pt-8 pb-2 text-center">
      <h1 class="text-2xl font-bold text-slate-900">Todo App</h1>
    </div>

    @if (error()) {
      <div
        class="mx-6 mt-4 flex items-center gap-2 rounded-lg bg-red-50 px-4 py-3 text-sm font-medium text-red-700"
        role="alert"
        aria-live="assertive"
      >
        <mat-icon class="text-red-600 !h-5 !w-5 text-[20px]">error_outline</mat-icon>
        {{ error() }}
      </div>
    }

    <form class="flex flex-col gap-4 p-6" [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="fill" class="w-full">
        <mat-label>아이디</mat-label>
        <mat-icon matIconPrefix class="text-slate-400">person</mat-icon>
        <input
          matInput
          formControlName="userId"
          autocomplete="username"
          aria-label="아이디"
          cdkFocusInitial
        />
        @if (userId.invalid && userId.touched) {
          <mat-error>아이디를 입력해 주세요.</mat-error>
        }
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label>비밀번호</mat-label>
        <mat-icon matIconPrefix class="text-slate-400">lock</mat-icon>
        <input
          matInput
          [type]="passwordVisible() ? 'text' : 'password'"
          formControlName="password"
          autocomplete="current-password"
          aria-label="비밀번호"
          (keyup)="onPasswordKey($event)"
          (keydown)="onPasswordKey($event)"
        />
        <button
          mat-icon-button
          matSuffix
          type="button"
          (click)="togglePasswordVisibility()"
          [attr.aria-label]="passwordVisible() ? '비밀번호 숨기기' : '비밀번호 표시'"
          [matTooltip]="passwordVisible() ? '숨기기' : '표시'"
        >
          <mat-icon class="text-slate-500">{{ passwordVisible() ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        @if (capsLockOn()) {
          <mat-hint class="flex items-center gap-1 text-amber-600">
            <mat-icon class="!h-4 !w-4 text-[16px]">warning</mat-icon> Caps Lock이 켜져 있습니다.
          </mat-hint>
        }
        @if (password.invalid && password.touched) {
          <mat-error>비밀번호를 입력해 주세요.</mat-error>
        }
      </mat-form-field>

      <button
        mat-flat-button
        color="primary"
        type="submit"
        class="!mt-2 !h-12 !rounded-xl !text-base font-semibold tracking-wide"
        [disabled]="form.invalid || loading()"
      >
        {{ loading() ? '로그인 중...' : '로그인' }}
      </button>
    </form>
  </mat-card>
</section>
